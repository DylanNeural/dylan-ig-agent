<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dylan — Agent</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0c0f;
    --card: #15171c;
    --border: #24272e;
    --text: #eceef1;
    --muted: #8b909a;
    --accent: #5b8cff;
    --ok: #34d399;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --border: #e4e6ea;
      --text: #14161a;
      --muted: #6b7078;
      --accent: #3f6df0;
      --ok: #18a06e;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.35);
  }
  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 6px;
  }
  p.tagline {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 28px;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--ok) 15%, transparent);
    color: var(--ok);
    font-size: 13px;
    font-weight: 600;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 60%, transparent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 45%, transparent); }
    70% { box-shadow: 0 0 0 8px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  footer {
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="avatar">D</div>
    <h1>Dylan</h1>
    <p class="tagline">@dylan.kali</p>
    <div class="status"><span class="dot"></span>En ligne</div>
    <footer>agent.dylankali.fr</footer>
  </div>
</body>
</html>
